<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>我的庫存櫃</title>
  <meta name="theme-color" content="#E0614C" />
  <meta name="description" content="備品、追星周邊、專輯收藏,一起管理。自動追蹤用量、提醒補貨、自動雲端同步。" />

  <!-- PWA / iOS 加入主畫面 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="庫存櫃" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root">
    <div class="center"><div class="spin"></div><div>載入中…</div></div>
  </div>

  <!-- App 主程式(雲端網址改在 App 內設定,不用改任何檔案) -->
  <script type="module" src="app.js"></script>

  <script>
    // 註冊 Service Worker(離線 + 可安裝)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
